name: CI · Main Push

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint AppleScript & Shell
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate repository structure
        run: |
          set -euo pipefail
          required=(
            AGENTS.md
            LICENSE
            README.md
            SKILL.md
            Makefile
            scripts/account/list.applescript
            scripts/account/default.applescript
            scripts/chat/list.applescript
            scripts/send.applescript
            scripts/history.sh
            tests/dictionary_contract.sh
            tests/smoke_imessage.sh
          )
          for path in "${required[@]}"; do
            [ -f "$path" ] || { echo "::error file=$path::Missing required file"; exit 1; }
          done

      - name: Check AppleScript syntax
        run: |
          set -euo pipefail
          make compile

      - name: Check shell scripts
        run: |
          set -euo pipefail
          if command -v shellcheck >/dev/null 2>&1; then
            shellcheck tests/*.sh scripts/*.sh
          else
            echo "shellcheck not available, skipping"
          fi

      - name: Validate SKILL.md frontmatter
        run: |
          set -euo pipefail
          if ! head -1 SKILL.md | grep -q '^---'; then
            echo "::error::SKILL.md must start with YAML frontmatter (---)"
            exit 1
          fi
          if ! grep -q '^name:' SKILL.md; then
            echo "::error::SKILL.md frontmatter must contain 'name:' field"
            exit 1
          fi
          if ! grep -q '^description:' SKILL.md; then
            echo "::error::SKILL.md frontmatter must contain 'description:' field"
            exit 1
          fi
          echo "SKILL.md frontmatter is valid"

      - name: Run dictionary contract
        run: |
          set -euo pipefail
          bash tests/dictionary_contract.sh

      - name: Run smoke test
        run: |
          set -euo pipefail
          make test
